<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hover Expand Gallery</title>

<style>
/* ── Reset ─────────────────────────────────────────────────────────── */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0f0f0f;
  height: 100vh;
  font-family: sans-serif;
  overflow: hidden;
}

/* ── Gallery container ─────────────────────────────────────────────── */
.gallery {
  display: flex;
  width: 100%;
  height: 100vh;
  overflow: hidden;   /* clip outermost edges only */
}

/* ── Individual items ──────────────────────────────────────────────── */
/*
 * Fixed flex-basis — JS never touches this.
 * Expansion is purely visual: scaleX on the item + translateX to pack.
 * This eliminates all layout reflow from the animation loop.
 */
.item {
  flex: 0 0 20%;
  min-width: 0;
  position: relative;
  cursor: pointer;
  transform-origin: left center;
  will-change: transform;
}

/* Active item sits above its neighbours (z-index raised in JS) */
.item.active .card {
  z-index: 2;
}

/* ── Inner card ────────────────────────────────────────────────────── */
.card {
  position: absolute;
  inset: 0;
  overflow: hidden;
  border-radius: 14px;
  will-change: transform, border-radius;
}

/* ── Images ────────────────────────────────────────────────────────── */
.item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  will-change: transform;
  user-select: none;
  pointer-events: none;
}

/* ── Overlay ───────────────────────────────────────────────────────── */
.card::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.3);
  opacity: var(--dim, 0);
  pointer-events: none;
}

/* ── Mobile ────────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  body { overflow-y: auto; }

  .gallery {
    flex-direction: column;
    height: auto;
    min-height: 100vh;
  }

  .item {
    flex: 0 0 20vh;
    transform-origin: top center;   /* vertical axis for mobile */
  }
}
</style>
</head>

<body>

<div class="gallery" id="gallery">
  <div class="item"><div class="card"><img src="https://picsum.photos/800/1200?1" alt="Gallery image 1"></div></div>
  <div class="item"><div class="card"><img src="https://picsum.photos/800/1200?2" alt="Gallery image 2"></div></div>
  <div class="item"><div class="card"><img src="https://picsum.photos/800/1200?3" alt="Gallery image 3"></div></div>
  <div class="item"><div class="card"><img src="https://picsum.photos/800/1200?4" alt="Gallery image 4"></div></div>
  <div class="item"><div class="card"><img src="https://picsum.photos/800/1200?5" alt="Gallery image 5"></div></div>
</div>

<script>
  const gallery = document.getElementById('gallery');
  const items   = Array.from(gallery.querySelectorAll('.item'));
  const cards   = items.map(el => el.querySelector('.card'));
  const imgs    = items.map(el => el.querySelector('img'));
  const N       = items.length;

  /* ── Tunables ────────────────────────────────────────────────────── */
  const MAX   = 3.2;   // peak scale multiplier
  const MIN   = 0.55;  // floor scale multiplier
  const LERP  = 0.085; // interpolation speed
  const SIGMA = 1.2;   // Gaussian spread in item-widths

  /* ── Container width (cached; updated on resize, never read in rAF) */
  let containerW = gallery.offsetWidth;
  new ResizeObserver(entries => {
    containerW = entries[0].contentRect.width;
  }).observe(gallery);

  /* ── State ───────────────────────────────────────────────────────── */
  let targetFlex  = new Array(N).fill(1);
  let currentFlex = new Array(N).fill(1);
  let targetW     = new Array(N).fill(0);
  let currentW    = new Array(N).fill(0);
  let globalTarget  = 0;
  let globalCurrent = 0;
  let activeIndex = -1;

  /* ── Gaussian ───────────────────────────────────────────────────── */
  function gauss(dist) {
    return Math.exp(-(dist * dist) / (2 * SIGMA * SIGMA));
  }

  /* ── Update targets from continuous cursor X ────────────────────── */
  function updateFromCursor(clientX) {
    const rect = gallery.getBoundingClientRect();
    const x    = Math.min(Math.max(clientX - rect.left, 0), rect.width);
    const t    = (x / rect.width) * N;

    let maxW = -Infinity, newActive = 0;
    for (let i = 0; i < N; i++) {
      const w       = gauss(t - (i + 0.5));
      targetW[i]    = w;
      targetFlex[i] = MIN + (MAX - MIN) * w;
      if (w > maxW) { maxW = w; newActive = i; }
    }
    globalTarget = 1;

    if (newActive !== activeIndex) {
      activeIndex = newActive;
      items.forEach((el, i) => el.classList.toggle('active', i === activeIndex));
    }
  }

  /* ── Reset ───────────────────────────────────────────────────────── */
  function clearActive() {
    activeIndex  = -1;
    globalTarget = 0;
    targetFlex   = new Array(N).fill(1);
    targetW      = new Array(N).fill(0);
    items.forEach(el => el.classList.remove('active'));
  }

  /* ── Events ──────────────────────────────────────────────────────── */
  gallery.addEventListener('mousemove',  e => updateFromCursor(e.clientX));
  gallery.addEventListener('mouseleave', clearActive);

  items.forEach((item, i) => {
    item.addEventListener('click', () => {
      if (i === activeIndex) {
        clearActive();
      } else {
        const rect    = gallery.getBoundingClientRect();
        const centerX = rect.left + ((i + 0.5) / N) * rect.width;
        updateFromCursor(centerX);
      }
    });
  });

  /* ── rAF loop ────────────────────────────────────────────────────── *
   *                                                                    *
   * v6: scaleX + translateX instead of flex-basis.                    *
   *                                                                    *
   * flex-basis is NEVER written → zero layout reflow.                 *
   * Each item's visual width = S[i] * baseW (compositor-only).        *
   *                                                                    *
   * Packing algorithm:                                                 *
   *   S[i] = normalised scale so that sum(S) == N (fills container)   *
   *   cumOffset tracks the visual left edge of each item              *
   *   dx = cumOffset - i*baseW  (translateX to slide item into place) *
   *                                                                    *
   * Border-radius correction:                                          *
   *   scaleX(S) stretches horizontal radii by S.                      *
   *   Setting border-radius to (14/S)px / 14px keeps corners circular.*
   *                                                                    *
   * Image: counter-zoom only; slight horizontal stretch from scaleX   *
   *   is imperceptible during motion.                                  */
  function animate() {
    let dirty = false;

    const gDiff = globalTarget - globalCurrent;
    if (Math.abs(gDiff) > 0.0002) { globalCurrent += gDiff * LERP; dirty = true; }
    else globalCurrent = globalTarget;

    for (let i = 0; i < N; i++) {
      const fDiff = targetFlex[i] - currentFlex[i];
      const wDiff = targetW[i]    - currentW[i];
      if (Math.abs(fDiff) > 0.0002) { currentFlex[i] += fDiff * LERP; dirty = true; }
      else currentFlex[i] = targetFlex[i];
      if (Math.abs(wDiff) > 0.0002) { currentW[i] += wDiff * LERP; dirty = true; }
      else currentW[i] = targetW[i];
    }

    if (dirty) {
      const total = currentFlex.reduce((a, b) => a + b, 0);
      const baseW = containerW / N;   // safe: cached, no layout read

      let cumOffset = 0;

      for (let i = 0; i < N; i++) {
        const S = (currentFlex[i] / total) * N;  // sum(S) == N
        const w = currentW[i];

        // Pack: translate to the visual right edge of the previous item
        const dx = cumOffset - i * baseW;
        cumOffset += S * baseW;

        // Item: compositor-only expand
        items[i].style.transform = `translateX(${dx.toFixed(2)}px) scaleX(${S.toFixed(4)})`;
        items[i].style.zIndex    = Math.round(w * 10);

        // Card: slight pop + undo the horizontal radius stretch from parent scaleX
        const pop = 1 + w * 0.02;
        cards[i].style.transform    = `scale(${pop.toFixed(4)})`;
        cards[i].style.borderRadius = `${(14 / S).toFixed(3)}px / 14px`;

        // Shadow grows with weight
        cards[i].style.boxShadow = w > 0.01
          ? `0 ${(w * 24).toFixed(1)}px ${(w * 64).toFixed(1)}px rgba(0,0,0,${(w * 0.5).toFixed(3)})`
          : 'none';

        // Image: counter-zoom (1.08→1.0 as item expands)
        imgs[i].style.transform = `scale(${(1.08 - w * 0.08).toFixed(4)})`;

        // Dim overlay
        cards[i].style.setProperty('--dim', (globalCurrent * (1 - w)).toFixed(3));
      }
    }

    requestAnimationFrame(animate);
  }

  animate();
</script>

</body>
</html>
