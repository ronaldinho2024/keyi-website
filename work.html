<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fan Keyi — Work</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body.work-page {
            background: var(--bg);
            min-height: 100vh;
        }

        .work-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
            padding-top: 80px;
        }

        /* ── Image panel ───────────────────────────────────────────── */
        .work-image-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 48px 60px 60px;
            position: sticky;
            top: 80px;
            height: calc(100vh - 80px);
        }

        .work-image-panel img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        /* ── Text panel ────────────────────────────────────────────── */
        .work-text-panel {
            padding: 80px 64px 80px 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 1px solid var(--ink-faint);
        }

        /* English section */
        .work-section-en {
            padding-bottom: 56px;
            border-bottom: 1px solid var(--ink-faint);
            margin-bottom: 56px;
        }

        .work-title-en {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 32px;
            font-weight: 400;
            color: var(--ink);
            letter-spacing: 0.02em;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .work-meta-en {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 12px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-bottom: 36px;
        }

        .work-description-en {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 17px;
            line-height: 1.85;
            color: var(--ink);
        }

        /* Chinese section */
        .work-title-zh {
            font-family: 'Noto Serif SC', serif;
            font-size: 22px;
            font-weight: 300;
            color: var(--ink);
            letter-spacing: 0.08em;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .work-meta-zh {
            font-family: 'Noto Serif SC', serif;
            font-size: 12px;
            letter-spacing: 0.1em;
            color: var(--ink-muted);
            margin-bottom: 36px;
        }

        .work-description-zh {
            font-family: 'Noto Serif SC', serif;
            font-size: 15px;
            line-height: 2;
            color: var(--ink);
            font-weight: 300;
        }

        /* ── Top bar: back button only ─────────────────────────────── */
        .artwork-topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 28px 44px;
        }

        .work-back-btn {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ink-muted);
            transition: color 0.2s;
        }
        .work-back-btn:hover { color: var(--ink); }

        /* ── Nav prev/next ─────────────────────────────────────────── */
        .work-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 64px;
            padding-top: 32px;
            border-top: 1px solid var(--ink-faint);
        }

        .work-nav-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ink-muted);
            transition: color 0.2s;
            padding: 0;
        }

        .work-nav-btn:hover { color: var(--ink); }
        .work-nav .work-nav-next { text-align: right; }

        /* ── Not found ─────────────────────────────────────────────── */
        .work-not-found {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 14px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--ink-muted);
        }

        /* ── Responsive ─────────────────────────────────────────────── */
        @media (max-width: 800px) {
            .work-layout {
                grid-template-columns: 1fr;
                padding-top: 72px;
            }

            .work-image-panel {
                position: static;
                height: auto;
                padding: 40px 32px 0;
            }

            .work-image-panel img {
                max-height: 60vw;
            }

            .work-text-panel {
                padding: 48px 32px 64px;
                border-left: none;
                border-top: 1px solid var(--ink-faint);
                margin-top: 40px;
            }
        }
    </style>
</head>
<body class="work-page">

    <div class="artwork-topbar">
        <a class="work-back-btn" href="works.html">← Works</a>
    </div>

    <div id="root"></div>

    <script type="module">
        import { ARTWORKS } from './js/artworks.js';

        const root = document.getElementById('root');

        function renderDesc(text, cls) {
            if (!text) return '';
            return text.trim().split(/\n\n+/).map(p =>
                `<p class="${cls}">${p.replace(/\n/g, '<br>')}</p>`
            ).join('');
        }

        function render(idx) {
            if (idx === -1) {
                root.innerHTML = '<p class="work-not-found">Work not found</p>';
                return;
            }

            const aw   = ARTWORKS[idx];
            const prev = idx > 0                    ? ARTWORKS[idx - 1] : null;
            const next = idx < ARTWORKS.length - 1  ? ARTWORKS[idx + 1] : null;

            document.title = `Fan Keyi — ${aw.title}`;

            // Build meta line — only include non-empty values
            const metaPartsEn = [aw.mediumEn, aw.dimensions, aw.year].filter(Boolean);
            const metaPartsZh = [aw.medium,   aw.dimensions, aw.year].filter(Boolean);

            root.innerHTML = `
                <div class="work-layout">
                    <div class="work-image-panel">
                        <img src="${aw.img}" alt="${aw.title}">
                    </div>
                    <div class="work-text-panel">

                        <div class="work-section-en">
                            <h1 class="work-title-en">${aw.title}</h1>
                            ${metaPartsEn.length ? `<p class="work-meta-en">${metaPartsEn.join(' &nbsp;·&nbsp; ')}</p>` : ''}
                            ${renderDesc(aw.descriptionEn, 'work-description-en')}
                        </div>

                        <div class="work-section-zh">
                            <h2 class="work-title-zh">${aw.titleZh || aw.title}</h2>
                            ${metaPartsZh.length ? `<p class="work-meta-zh">${metaPartsZh.join(' · ')}</p>` : ''}
                            ${renderDesc(aw.descriptionZh, 'work-description-zh')}
                        </div>

                        <nav class="work-nav">
                            <div class="work-nav-prev">
                                ${prev ? `<button class="work-nav-btn" data-idx="${idx - 1}">← ${prev.title}</button>` : ''}
                            </div>
                            <div class="work-nav-next">
                                ${next ? `<button class="work-nav-btn" data-idx="${idx + 1}">${next.title} →</button>` : ''}
                            </div>
                        </nav>

                    </div>
                </div>
            `;

            // Wire up prev/next buttons — no page reload
            root.querySelectorAll('.work-nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const newIdx = parseInt(btn.dataset.idx, 10);
                    const newAw  = ARTWORKS[newIdx];
                    history.pushState(null, '', `work.html?id=${newAw.id}`);
                    render(newIdx);
                    window.scrollTo(0, 0);
                });
            });
        }

        // Handle browser back/forward
        window.addEventListener('popstate', () => {
            const id  = new URLSearchParams(window.location.search).get('id');
            const idx = ARTWORKS.findIndex(a => a.id === id);
            render(idx);
            window.scrollTo(0, 0);
        });

        const id  = new URLSearchParams(window.location.search).get('id');
        const idx = ARTWORKS.findIndex(a => a.id === id);
        render(idx);
    </script>

</body>
</html>
